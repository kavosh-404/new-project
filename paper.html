<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Research Paper Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,500;6..72,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <style>
      .paper-container {
        display: grid;
        gap: 1rem;
      }
      .pdf-frame {
        width: 100%;
        min-height: 80vh;
        border: 1px solid rgba(79, 57, 36, 0.16);
        border-radius: var(--radius-xl);
        overflow: hidden;
        box-shadow: var(--shadow);
        background: #fffdf9;
      }
      .pdf-frame object {
        width: 100%;
        height: 100%;
        border: 0;
      }
      .notice {
        margin: 0;
        color: var(--muted);
        font-size: 0.95rem;
      }
      .pill-link.back {
        background: linear-gradient(135deg, #b08968 0%, #8a5a44 100%);
      }
      .figure-strip {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 0.8rem;
      }
      .figure-card {
        margin: 0;
        padding: 0.75rem;
        border-radius: var(--radius-md);
        border: 1px solid rgba(79, 57, 36, 0.14);
        background: rgba(255, 255, 255, 0.74);
      }
      .figure-card figcaption {
        margin-bottom: 0.45rem;
        color: #0f4f4a;
        font-weight: 700;
        font-size: 0.84rem;
      }
      .figure-card canvas {
        display: block;
        width: 100%;
        min-height: 240px;
        border: 1px dashed rgba(15, 118, 110, 0.26);
        border-radius: 10px;
        background: #fffdf9;
      }
      .figure-card a {
        margin-top: 0.45rem;
        display: inline-block;
        color: #0f4f4a;
        font-size: 0.82rem;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="site-shell">
      <header class="hero">
        <div class="hero-top">
          <p class="eyebrow">Reference Viewer</p>
          <a class="pill-link back" href="index.html">Back to Simulation</a>
        </div>
        <h1>Smaldino &amp; Schank (2012)</h1>
        <p class="subtitle">
          Embedded reference copy for quick citation checks alongside the simulation.
        </p>
      </header>

      <main class="paper-container">
        <p class="notice">
          If the PDF does not load, open it directly:
          <a href="smaldino-schank-2012.pdf">smaldino-schank-2012.pdf</a>
        </p>
        <section aria-labelledby="paper-figures-title" class="figure-strip">
          <h2 id="paper-figures-title" style="grid-column:1/-1;margin:0;font-size:1.05rem;">Research Figure Pages</h2>
          <figure class="figure-card">
            <figcaption>Figure-heavy page p.16</figcaption>
            <canvas id="paper-figure-page-16" aria-label="Rendered paper page 16"></canvas>
            <a href="smaldino-schank-2012.pdf#page=16">Open page 16</a>
          </figure>
          <figure class="figure-card">
            <figcaption>Figure-heavy page p.17</figcaption>
            <canvas id="paper-figure-page-17" aria-label="Rendered paper page 17"></canvas>
            <a href="smaldino-schank-2012.pdf#page=17">Open page 17</a>
          </figure>
          <figure class="figure-card">
            <figcaption>Figure-heavy page p.18</figcaption>
            <canvas id="paper-figure-page-18" aria-label="Rendered paper page 18"></canvas>
            <a href="smaldino-schank-2012.pdf#page=18">Open page 18</a>
          </figure>
        </section>
        <div class="pdf-frame" aria-label="Embedded research PDF">
          <object
            data="smaldino-schank-2012.pdf"
            type="application/pdf"
          >
            <p>
              PDF viewer not supported. Use the direct link above to open the paper.
            </p>
          </object>
        </div>
      </main>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
      (function () {
        if (!window.pdfjsLib) return;

        const targets = [
          { id: "paper-figure-page-16", page: 16 },
          { id: "paper-figure-page-17", page: 17 },
          { id: "paper-figure-page-18", page: 18 },
        ];

        function paintFallback(canvas, message) {
          const ctx = canvas.getContext("2d");
          if (!ctx) return;
          const width = Math.max(300, canvas.clientWidth || 320);
          const height = 240;
          canvas.width = width;
          canvas.height = height;
          canvas.style.width = width + "px";
          canvas.style.height = height + "px";
          ctx.fillStyle = "#fffdf9";
          ctx.fillRect(0, 0, width, height);
          ctx.strokeStyle = "rgba(15, 118, 110, 0.26)";
          ctx.setLineDash([6, 4]);
          ctx.strokeRect(8, 8, width - 16, height - 16);
          ctx.setLineDash([]);
          ctx.fillStyle = "#355c57";
          ctx.font = "13px Instrument Sans, sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(message, width / 2, height / 2);
        }

        window.pdfjsLib
          .getDocument({
            url: "smaldino-schank-2012.pdf",
            disableWorker: true,
          })
          .promise.then(function (pdfDoc) {
            return Promise.all(
              targets.map(function (target) {
                const canvas = document.getElementById(target.id);
                if (!canvas) return Promise.resolve();

                return pdfDoc.getPage(target.page).then(function (page) {
                  const baseViewport = page.getViewport({ scale: 1 });
                  const targetWidth = Math.max(300, canvas.clientWidth || 320);
                  const scale = targetWidth / baseViewport.width;
                  const viewport = page.getViewport({ scale: scale });
                  const ratio = window.devicePixelRatio || 1;
                  const ctx = canvas.getContext("2d");

                  canvas.width = Math.floor(viewport.width * ratio);
                  canvas.height = Math.floor(viewport.height * ratio);
                  canvas.style.width = Math.floor(viewport.width) + "px";
                  canvas.style.height = Math.floor(viewport.height) + "px";
                  ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
                  ctx.clearRect(0, 0, viewport.width, viewport.height);

                  return page.render({ canvasContext: ctx, viewport: viewport }).promise;
                });
              })
            );
          })
          .catch(function (error) {
            var reason = error && error.message ? error.message : "render failed";
            targets.forEach(function (target) {
              const canvas = document.getElementById(target.id);
              if (canvas) paintFallback(canvas, "Could not render: " + reason);
            });
          });
      })();
    </script>
  </body>
</html>
